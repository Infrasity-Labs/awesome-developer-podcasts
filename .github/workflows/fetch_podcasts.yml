name: Fetch Podcasts

on:
  schedule:
    # Run automatically every day at midnight (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow running the workflow manually from the GitHub Actions tab

jobs:
  fetch:
    name: Fetch (${{ matrix.fetcher }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Don't cancel other fetchers if one fails
      matrix:
        fetcher: 
          - apple_podcasts
          - cloudways
          - extract_existing
          - feedspot
          - podcastindex_fetcher
          - spotify
          - syntax
          - transistor
          
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Fetcher Script
        env:
          PODCASTINDEX_API_KEY: ${{ secrets.PODCASTINDEX_API_KEY }}
          PODCASTINDEX_API_SECRET: ${{ secrets.PODCASTINDEX_API_SECRET }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          mkdir -p data
          python "fetchers/${{ matrix.fetcher }}.py"
          
      - name: Upload JSON Data
        uses: actions/upload-artifact@v4
        with:
          name: data-${{ matrix.fetcher }}
          path: data/*.json
          if-no-files-found: ignore
          retention-days: 1

  aggregate:
    name: Aggregate & Commit
    needs: fetch
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install codespell

      - name: Download all JSON Data
        uses: actions/download-artifact@v4
        with:
          path: data-artifacts

      - name: Consolidate Data
        run: |
          mkdir -p data
          # Download artifact creates subfolders, so we move all json files into data/
          find data-artifacts -name "*.json" -exec cp {} data/ \;
          ls -la data/

      - name: Lint and Fix Spelling
        run: codespell data/*.json --write-changes || true
        continue-on-error: true

      - name: Aggregate and Update README
        run: python aggregate.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff-index --quiet HEAD; then
            git commit -m "docs: auto-update podcasts list"
            git push
          else
            echo "No changes to commit. Everything is up to date!"
          fi
