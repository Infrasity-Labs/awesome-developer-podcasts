name: PR Lint and Checks

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install codespell

      - name: Check and Fix Spelling
        run: codespell README.md --write-changes

      - name: Run Aggregator (Auto-Formats & Sorts README)
        run: |
          # The aggregator extracts existing podcasts from the README, 
          # sorts them alphabetically, fixes category names, and regenerates the tables.
          python fetchers/extract_existing.py || echo "No existing fetcher"
          python aggregate.py || echo "Aggregator failed"

      - name: Commit Auto-fixes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-fix PR linting, spelling, and formatting issues" && git push)
